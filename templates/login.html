{% extends 'base.html' %}

{% block title %}लॉगिन - Krishi AI{% endblock %}

{% block extra_css %}
<style>
    .auth-page {
        min-height: calc(100vh - 140px);
        display: flex;
        align-items: center;
        justify-content: center;
        background: linear-gradient(135deg, rgba(46,125,50,0.05) 0%, rgba(129,199,132,0.15) 100%);
        padding: 40px 20px;
    }
    
    .auth-card {
        background: rgba(255, 255, 255, 0.95);
        backdrop-filter: blur(10px);
        border-radius: 20px;
        padding: 40px;
        width: 100%;
        max-width: 450px;
        box-shadow: 0 10px 30px rgba(0,0,0,0.08), 0 1px 8px rgba(0,0,0,0.04);
        border: 1px solid rgba(255,255,255,0.4);
        text-align: center;
        animation: slideUp 0.5s ease-out;
    }

    .auth-header {
        margin-bottom: 30px;
    }

    .auth-icon {
        width: 60px;
        height: 60px;
        background: linear-gradient(135deg, #2E7D32, #4CAF50);
        color: white;
        border-radius: 50%;
        display: flex;
        align-items: center;
        justify-content: center;
        font-size: 28px;
        margin: 0 auto 15px;
        box-shadow: 0 4px 15px rgba(46,125,50,0.3);
    }

    .auth-title {
        font-family: 'Baloo 2', cursive;
        font-size: 28px;
        color: #1a1a1a;
        margin-bottom: 5px;
        font-weight: 700;
    }

    .auth-subtitle {
        color: #666;
        font-size: 15px;
    }

    .form-group {
        margin-bottom: 20px;
        text-align: left;
    }

    .form-label {
        display: block;
        font-weight: 600;
        color: #333;
        margin-bottom: 8px;
        font-size: 14px;
    }

    .form-input-wrapper {
        position: relative;
    }

    .form-input-wrapper i {
        position: absolute;
        left: 15px;
        top: 50%;
        transform: translateY(-50%);
        color: #888;
        font-size: 18px;
    }

    .form-control {
        width: 100%;
        padding: 12px 15px 12px 45px;
        border: 2px solid #e0e0e0;
        border-radius: 10px;
        font-size: 16px;
        transition: all 0.3s;
        font-family: 'Poppins', sans-serif;
    }

    .form-control:focus {
        border-color: #2E7D32;
        outline: none;
        box-shadow: 0 0 0 4px rgba(46,125,50,0.1);
    }

    .auth-btn {
        width: 100%;
        padding: 14px;
        background: linear-gradient(135deg, #2E7D32, #4CAF50);
        color: white;
        border: none;
        border-radius: 10px;
        font-size: 18px;
        font-weight: 600;
        cursor: pointer;
        transition: transform 0.2s, box-shadow 0.2s;
        box-shadow: 0 4px 15px rgba(46,125,50,0.3);
        margin-top: 10px;
        font-family: 'Baloo 2', cursive;
    }

    .auth-btn:hover {
        transform: translateY(-2px);
        box-shadow: 0 6px 20px rgba(46,125,50,0.4);
    }

    .auth-footer {
        margin-top: 25px;
        font-size: 15px;
        color: #555;
    }

    .auth-link {
        color: #2E7D32;
        font-weight: 600;
        text-decoration: none;
        transition: 0.2s;
    }

    .auth-link:hover {
        color: #1b5e20;
        text-decoration: underline;
    }

    @keyframes slideUp {
        from { opacity: 0; transform: translateY(20px); }
        to { opacity: 1; transform: translateY(0); }
    }
</style>
{% endblock %}

{% block content %}
<div class="auth-page">
    <div class="auth-card">
        <div class="auth-header">
            <div class="auth-icon">
                <i class="fa-solid fa-seedling"></i>
            </div>
            <h1 class="auth-title">किसान लॉगिन</h1>
            <p class="auth-subtitle">अपने खाते में प्रवेश करें और खेती को आसान बनाएं</p>
        </div>

        <form action="{{ url_for('login') }}" method="POST">
            <div class="form-group">
                <label class="form-label">किसान आईडी या मोबाइल नंबर</label>
                <div class="form-input-wrapper">
                    <i class="fa-solid fa-user"></i>
                    <input type="text" name="identifier" class="form-control" placeholder="उदा. AT261234 या 9876543210" required>
                </div>
            </div>

            <div class="form-group">
                <label class="form-label">पासवर्ड</label>
                <div class="form-input-wrapper">
                    <i class="fa-solid fa-lock"></i>
                    <input type="password" name="password" class="form-control" placeholder="अपना पासवर्ड दर्ज करें" required>
                </div>
            </div>

            <button type="submit" class="auth-btn">लॉगिन करें <i class="fa-solid fa-arrow-right" style="margin-left: 5px;"></i></button>
        </form>

        <div class="auth-footer">
            नया खाता बनाना चाहते हैं? <a href="{{ url_for('register') }}" class="auth-link">यहाँ रजिस्टर करें</a>
        </div>
    </div>
</div>
{% endblock %}
